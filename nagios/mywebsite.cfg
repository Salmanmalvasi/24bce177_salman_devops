define host {
    use                     linux-server
    host_name               abc-website-host
    address                 host.docker.internal
    max_check_attempts      5
    check_period            24x7
    notification_interval   30
    notification_period     24x7
}

define service {
    use                     generic-service
    host_name               abc-website-host
    service_description     HTTP
    check_command           check_http!-p 8081
}
